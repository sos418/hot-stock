name: 盤後更新台股儀表板

on:
  schedule:
    # 每週一~五 08:40 UTC = 台北 16:40(待 T86 三大法人約 16:30 後發布)
    # 註:GitHub 排程可能延遲數十分鐘;休市/國定假日由 run.py 自行判斷並略過
    - cron: "40 8 * * 1-5"
  workflow_dispatch: {}        # 允許在 Actions 頁面手動觸發(測試用)

# 讓工作流程能 commit 回更新的快照與 data.js
permissions:
  contents: write

concurrency:
  group: daily-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei           # 讓 run.py 的「今日」用台北日期,休市判定才正確
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安裝相依套件
        run: pip install -r requirements.txt

      - name: 盤後執行 run.py(休市會自行略過、不寫檔)
        run: python run.py

      - name: Commit 並推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history web/data.js data/industry_chains.json
          if git diff --cached --quiet; then
            echo "今日無更新(休市或資料未變),略過 commit"
          else
            git commit -m "data: 盤後更新 $(date +%F)"
            git push
          fi

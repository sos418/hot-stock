<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>台股分析儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #11151c; --card: #1a212c; --line: #2a3342;
  --text: #e8eaed; --muted: #9aa3b2; --accent: #4d9fec;
  --up: #e54d42; --down: #2e9e5b; /* 台股慣例:紅漲綠跌 */
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
  background: var(--bg); color: var(--text);
  max-width: 1180px; margin: 0 auto; padding: 24px 20px 60px;
}
h1 { font-size: 22px; }
h2 { font-size: 17px; margin: 32px 0 12px; border-left: 4px solid var(--accent); padding-left: 10px; }
.meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
.badge {
  display: inline-block; background: #c9a227; color: #1a1a1a; font-weight: 600;
  border-radius: 4px; padding: 2px 8px; font-size: 12px; margin: 6px 6px 0 0;
}
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
.card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
.card .name { font-size: 13px; color: var(--muted); }
.card .close { font-size: 20px; font-weight: 700; margin: 4px 0; }
.card .rows { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
.up { color: var(--up); }
.down { color: var(--down); }
.panel { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 16px; margin-top: 12px; }
.toggles { margin-bottom: 10px; font-size: 14px; }
.toggles label { margin-right: 16px; cursor: pointer; user-select: none; }
table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; font-size: 14px; }
th, td { padding: 9px 12px; text-align: right; border-bottom: 1px solid var(--line); }
th { background: #202938; color: var(--muted); font-weight: 600; font-size: 13px; }
th:first-child, td:first-child { text-align: left; }
tr.clickable { cursor: pointer; }
tr.clickable:hover { background: #222b3a; }
tr.detail-row td { background: #161c26; text-align: left; font-size: 13px; color: var(--muted); }
.detail-grid { display: flex; gap: 28px; flex-wrap: wrap; padding: 4px 0; }
.score { font-weight: 700; }
.arrow-up { color: var(--up); font-weight: 700; }
.arrow-down { color: var(--down); font-weight: 700; }
.pending { color: var(--muted); font-size: 12px; }
.empty { padding: 40px; text-align: center; color: var(--muted); }
canvas { max-width: 100%; }
.datebar { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin: 2px 0 4px; }
.datebar .pill {
  display: inline-flex; align-items: baseline; gap: 8px;
  background: var(--accent); color: #0c1118; font-weight: 700;
  border-radius: 8px; padding: 6px 14px; font-size: 20px; letter-spacing: 0.5px;
}
.datebar .pill .lbl { font-size: 12px; font-weight: 600; opacity: 0.75; }
.datebar .gen { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<h1>台股分析儀表板</h1>
<div class="meta" id="meta"></div>
<div id="stale"></div>

<div id="content">
  <h2>國際大盤</h2>
  <div class="cards" id="index-cards"></div>
  <div class="panel">
    <div class="toggles" id="series-toggles"></div>
    <canvas id="index-chart" height="90"></canvas>
    <div class="meta" id="corr"></div>
  </div>

  <h2>當下熱門族群 Top 10</h2>
  <div class="meta" style="margin-bottom:8px">族群=產業價值鏈分類(個股可屬多個族群);成交占比分母為全市場成交金額。</div>
  <table id="hot-table">
    <thead><tr>
      <th>族群</th><th>平均漲跌%</th><th>成交占比</th><th>漲停家數</th><th>創20日新高</th>
    </tr></thead>
    <tbody></tbody>
  </table>
  <div class="panel">
    <canvas id="share-chart"></canvas>
  </div>

  <h2>今日強勢族群
    <span style="font-size:15px;font-weight:400;color:var(--muted)">漲幅 &gt;
      <input id="th-input" type="number" step="0.5" min="0" max="10"
             style="width:56px;background:var(--card);color:var(--text);border:1px solid var(--line);
                    border-radius:4px;padding:3px 6px;font-size:14px"> % 家數</span>
  </h2>
  <div class="meta" style="margin-bottom:8px">以<b>產業鏈</b>為單位統計當日漲幅超過上方門檻的個股(可即時調整);點欄位標題可排序,點族群列展開底下熱門子族群與強勢個股。</div>
  <table id="score-table">
    <thead><tr>
      <th>產業鏈</th>
      <th class="sortable" data-key="strong_count">強勢股家數</th>
      <th class="sortable" data-key="strong_ratio">強勢比例 ▾</th>
      <th class="sortable" data-key="member_count">族群家數</th>
      <th>近20日家數</th>
    </tr></thead>
    <tbody></tbody>
  </table>

  <h2>族群趨勢</h2>
  <div class="meta" style="margin-bottom:8px">選一條產業鏈,看近 20 交易日的<b>強勢股家數</b>(漲幅 &gt;8%,紅線)與<b>成交占比</b>(藍線)走勢——判斷題材在加溫還是退燒。資料逐日累積,不足時顯示「累積中」。</div>
  <div class="panel">
    <select id="trend-select" style="background:var(--card);color:var(--text);border:1px solid var(--line);border-radius:4px;padding:5px 8px;font-size:14px;margin-bottom:10px"></select>
    <canvas id="trend-chart" height="90"></canvas>
  </div>
</div>

<script src="data.js"></script>
<script>
(function () {
  const D = window.DASHBOARD_DATA;
  if (!D) {
    document.getElementById("content").innerHTML =
      '<div class="empty">尚無資料,請先執行 python run.py</div>';
    return;
  }
  const NAMES = { "^TWII": "台股加權", "^SOX": "費城半導體", "^GSPC": "S&P 500" };
  const COLORS = { "^TWII": "#e54d42", "^SOX": "#4d9fec", "^GSPC": "#c9a227" };

  function fmtPct(v) {
    if (v === null || v === undefined) return "—";
    return (v > 0 ? "+" : "") + v.toFixed(2) + "%";
  }
  function cls(v) { return v > 0 ? "up" : v < 0 ? "down" : ""; }

  document.getElementById("meta").innerHTML =
    '<div class="datebar">' +
    '<span class="pill"><span class="lbl">資料日期</span>' + D.date + "</span>" +
    '<span class="gen">產生於 ' + D.generated_at + "</span></div>";
  document.getElementById("stale").innerHTML = (D.stale_sources || [])
    .map(s => '<span class="badge">資料延遲:' + s + "</span>").join("");

  /* ---- F1 指數卡片 ---- */
  document.getElementById("index-cards").innerHTML = D.indices.cards.map(c => {
    if (c.close === null) {
      return '<div class="card"><div class="name">' + c.name +
             '</div><div class="close">—</div><div class="rows">無資料</div></div>';
    }
    return '<div class="card"><div class="name">' + c.name + " " + c.symbol + "</div>" +
      '<div class="close ' + cls(c.change_pct) + '">' + c.close.toLocaleString() + "</div>" +
      '<div class="rows">' +
      '<span class="' + cls(c.change_pct) + '">日 ' + fmtPct(c.change_pct) + "</span>" +
      '<span class="' + cls(c.d5_pct) + '">5日 ' + fmtPct(c.d5_pct) + "</span>" +
      '<span class="' + cls(c.d20_pct) + '">20日 ' + fmtPct(c.d20_pct) + "</span>" +
      "</div></div>";
  }).join("");

  /* ---- F1 折線圖(基期=100,可勾選) ---- */
  const chart = new Chart(document.getElementById("index-chart"), {
    type: "line",
    data: {
      labels: D.indices.chart.labels,
      datasets: Object.entries(D.indices.chart.series).map(([sym, vals]) => ({
        label: NAMES[sym] || sym, data: vals, borderColor: COLORS[sym] || "#888",
        borderWidth: 1.6, pointRadius: 0, tension: 0.2, _sym: sym,
      })),
    },
    options: {
      animation: false, interaction: { mode: "index", intersect: false },
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#9aa3b2", maxTicksLimit: 10 }, grid: { color: "#222b3a" } },
        y: { ticks: { color: "#9aa3b2" }, grid: { color: "#222b3a" } },
      },
    },
  });
  document.getElementById("series-toggles").innerHTML =
    chart.data.datasets.map((ds, i) =>
      '<label style="color:' + ds.borderColor + '">' +
      '<input type="checkbox" checked data-i="' + i + '"> ' + ds.label + "</label>").join("");
  document.getElementById("series-toggles").addEventListener("change", e => {
    const i = +e.target.dataset.i;
    chart.setDatasetVisibility(i, e.target.checked);
    chart.update();
  });
  document.getElementById("corr").textContent =
    D.indices.corr_twii_sox === null
      ? "台股–費半 20日相關係數:樣本不足"
      : "台股–費半 20日相關係數:" + D.indices.corr_twii_sox.toFixed(2);

  /* ---- F2 熱度榜 Top 10 ---- */
  document.querySelector("#hot-table tbody").innerHTML =
    D.sectors_hot.slice(0, 10).map(s =>
      "<tr><td>" + s.industry + "</td>" +
      '<td class="' + cls(s.avg_change_pct) + '">' + fmtPct(s.avg_change_pct) + "</td>" +
      "<td>" + (s.turnover_share * 100).toFixed(2) + "%</td>" +
      "<td>" + s.limit_up_count + "</td><td>" + s.new_high_count + "</td></tr>").join("");

  /* ---- F2 全族群成交占比橫條圖 ---- */
  const shareTop = D.sectors_hot.slice(0, 20);
  new Chart(document.getElementById("share-chart"), {
    type: "bar",
    data: {
      labels: shareTop.map(s => s.industry),
      datasets: [{
        label: "成交金額占比% (Top 20)",
        data: shareTop.map(s => +(s.turnover_share * 100).toFixed(2)),
        backgroundColor: "#4d9fec",
      }],
    },
    options: {
      indexAxis: "y", animation: false,
      plugins: { legend: { labels: { color: "#9aa3b2" } } },
      scales: {
        x: { ticks: { color: "#9aa3b2" }, grid: { color: "#222b3a" } },
        y: { ticks: { color: "#e8eaed", autoSkip: false }, grid: { display: false } },
      },
    },
  });

  /* ---- F3 今日強勢族群:門檻可動態輸入,產業鏈大傘 + 子族群層級於前端即時計算 ---- */
  const scoreBody = document.querySelector("#score-table tbody");
  const MIN_GROUP = D.min_group_size || 3;
  const TRENDS = (D.trends && D.trends.chains) || {};
  const stocksLine = arr => arr.map(s =>
    '<span class="up">' + s.code + " " + s.name + " +" + s.change_pct.toFixed(2) + "%</span>").join("、");

  // 近 N 日強勢股家數的迷你走勢圖(inline SVG)+ 連 3 日漲跌箭頭
  function trendArrow(vals) {
    const v = vals.filter(x => x != null);
    if (v.length < 3) return '<span class="pending">累積中</span>';
    const [a, b, c] = v.slice(-3);
    if (a < b && b < c) return '<span class="arrow-up">↑</span>';
    if (a > b && b > c) return '<span class="arrow-down">↓</span>';
    return "→";
  }
  function sparkline(vals) {
    const v = vals.filter(x => x != null);
    if (v.length < 2) return '<span class="pending">累積中</span>';
    const w = 60, h = 16, max = Math.max(...v), min = Math.min(...v), rng = (max - min) || 1;
    const pts = vals.map((x, i) => x == null ? null :
      (i / (vals.length - 1) * w).toFixed(1) + "," + (h - (x - min) / rng * h).toFixed(1))
      .filter(Boolean).join(" ");
    return '<svg width="' + w + '" height="' + h + '" style="vertical-align:middle">' +
      '<polyline points="' + pts + '" fill="none" stroke="#4d9fec" stroke-width="1.5"/></svg> ' +
      trendArrow(vals);
  }

  // 依門檻 th 從原始 (個股,族群) 資料建出「產業鏈 → 子族群」強勢樹
  function computeTree(th) {
    const chainAgg = {}, subAgg = {};
    for (const [code, name, pct, chain, group] of (D.f3_members || [])) {
      const bucket = group === chain ? chainAgg : subAgg;
      const k = group === chain ? chain : chain + "␀" + group;
      const a = bucket[k] || (bucket[k] = { chain, group, codes: new Set(), strong: [] });
      a.codes.add(code);
      if (pct > th) a.strong.push({ code, name, change_pct: pct });
    }
    const node = a => ({
      industry: a.group, chain: a.chain, strong_count: a.strong.length,
      member_count: a.codes.size, strong_ratio: a.strong.length / a.codes.size,
      strong_stocks: a.strong.sort((x, y) => y.change_pct - x.change_pct),
    });
    const kids = {};
    for (const k in subAgg) {
      const a = subAgg[k];
      if (a.strong.length >= 2) (kids[a.chain] || (kids[a.chain] = [])).push(node(a));
    }
    const tree = [];
    for (const c in chainAgg) {
      const a = chainAgg[c];
      if (a.strong.length >= 2 && a.codes.size >= MIN_GROUP) {
        const n = node(a);
        n.children = (kids[c] || []).sort((x, y) =>
          y.strong_count - x.strong_count || y.strong_ratio - x.strong_ratio);
        tree.push(n);
      }
    }
    return tree;
  }

  function renderStrong(key, desc) {
    const th = parseFloat(thInput.value);
    const data = computeTree(isNaN(th) ? D.strong_threshold : th);
    if (!data.length) {
      scoreBody.innerHTML = '<tr><td colspan="5" class="pending">此門檻下無族群性強勢股(放寬門檻試試)</td></tr>';
      return;
    }
    const rows = data.sort((a, b) =>
      (desc ? b[key] - a[key] : a[key] - b[key])
      || (b.strong_count - a.strong_count) || (b.strong_ratio - a.strong_ratio));
    scoreBody.innerHTML = rows.map((b, i) => {
      const kids = (b.children || []).length
        ? '<div style="margin-bottom:6px">熱門子族群:' + b.children.map(k =>
            "<div style=\"margin:2px 0 2px 12px\">▪ <b>" + k.industry + "</b> " +
            k.strong_count + "檔/" + k.member_count + " (" + (k.strong_ratio * 100).toFixed(0) +
            "%):" + stocksLine(k.strong_stocks) + "</div>").join("") + "</div>"
        : "";
      const detail = kids + "全鏈強勢個股:" + stocksLine(b.strong_stocks);
      const spark = TRENDS[b.industry] ? sparkline(TRENDS[b.industry].strong_count) : "";
      return '<tr class="clickable" data-i="' + i + '"><td>' + b.industry +
        (b.children && b.children.length ? ' <span class="pending">(' + b.children.length + ' 子群)</span>' : "") +
        "</td>" +
        '<td class="score">' + b.strong_count + "</td>" +
        "<td>" + (b.strong_ratio * 100).toFixed(0) + "%</td>" +
        "<td>" + b.member_count + "</td>" +
        '<td style="text-align:right">' + spark + "</td></tr>" +
        '<tr class="detail-row" data-d="' + i + '" hidden><td colspan="5">' + detail + "</td></tr>";
    }).join("");
  }

  const thInput = document.getElementById("th-input");
  thInput.value = D.strong_threshold != null ? D.strong_threshold : 8;
  let sortKey = "strong_ratio", sortDesc = true;  // 預設依強勢比例(整鏈在噴者優先)
  renderStrong(sortKey, sortDesc);
  thInput.addEventListener("input", () => renderStrong(sortKey, sortDesc));

  scoreBody.addEventListener("click", e => {
    const tr = e.target.closest("tr.clickable");
    if (!tr) return;
    const d = scoreBody.querySelector('tr.detail-row[data-d="' + tr.dataset.i + '"]');
    d.hidden = !d.hidden;
  });
  document.querySelectorAll("#score-table th.sortable").forEach(th => {
    th.style.cursor = "pointer";
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      sortDesc = key === sortKey ? !sortDesc : true;
      sortKey = key;
      document.querySelectorAll("#score-table th.sortable").forEach(h =>
        h.textContent = h.textContent.replace(/ [▾▴]$/, ""));
      th.textContent += sortDesc ? " ▾" : " ▴";
      renderStrong(sortKey, sortDesc);
    });
  });

  /* ---- 族群趨勢圖:近 N 交易日 強勢股家數 + 成交占比 ---- */
  const trendSel = document.getElementById("trend-select");
  const chainNames = Object.keys(TRENDS);
  if (!chainNames.length || (D.trends.dates || []).length < 1) {
    trendSel.insertAdjacentHTML("afterend",
      '<div class="pending" style="padding:20px">趨勢資料累積中(每交易日盤後自動新增一天)</div>');
    trendSel.style.display = "none";
  } else {
    // 依今日(最後一天)強勢股家數排序,預設選最熱的鏈
    const lastOf = c => { const a = TRENDS[c].strong_count; return a[a.length - 1] || 0; };
    chainNames.sort((a, b) => lastOf(b) - lastOf(a));
    trendSel.innerHTML = chainNames.map(c => '<option value="' + c + '">' + c + "</option>").join("");

    let trendChart;
    function drawTrend(chain) {
      const t = TRENDS[chain];
      if (trendChart) trendChart.destroy();
      trendChart = new Chart(document.getElementById("trend-chart"), {
        type: "line",
        data: {
          labels: D.trends.dates,
          datasets: [
            { label: "強勢股家數 (>" + (D.trend_threshold || 8) + "%)", data: t.strong_count,
              borderColor: "#e54d42", backgroundColor: "#e54d42", yAxisID: "y",
              tension: 0.2, pointRadius: 2, spanGaps: true },
            { label: "成交占比 %", data: t.turnover_share,
              borderColor: "#4d9fec", backgroundColor: "#4d9fec", yAxisID: "y2",
              tension: 0.2, pointRadius: 2, spanGaps: true },
          ],
        },
        options: {
          animation: false, interaction: { mode: "index", intersect: false },
          plugins: { legend: { labels: { color: "#e8eaed" } } },
          scales: {
            x: { ticks: { color: "#9aa3b2", maxTicksLimit: 10 }, grid: { color: "#222b3a" } },
            y: { position: "left", beginAtZero: true, title: { display: true, text: "強勢股家數", color: "#e54d42" },
                 ticks: { color: "#e54d42", precision: 0 }, grid: { color: "#222b3a" } },
            y2: { position: "right", beginAtZero: true, title: { display: true, text: "成交占比%", color: "#4d9fec" },
                  ticks: { color: "#4d9fec" }, grid: { display: false } },
          },
        },
      });
    }
    drawTrend(chainNames[0]);
    trendSel.addEventListener("change", () => drawTrend(trendSel.value));
  }
})();
</script>
</body>
</html>
